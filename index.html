<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页代码预览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #e94560;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-run {
            background: #e94560;
            color: white;
        }

        .btn-run:hover {
            background: #ff6b6b;
        }

        .btn-clear {
            background: #0f3460;
            color: #eee;
        }

        .btn-clear:hover {
            background: #1a4a7a;
        }

        .btn-paste {
            background: #533483;
            color: white;
        }

        .btn-paste:hover {
            background: #6b44a0;
        }

        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-section, .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: flex 0.3s ease;
        }

        .editor-section {
            border-right: 1px solid #0f3460;
        }

        .section-header {
            background: #16213e;
            padding: 12px 16px;
            font-size: 13px;
            color: #888;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .section-header:active {
            background: #1a2a4a;
        }

        .collapse-icon {
            transition: transform 0.3s ease;
            font-size: 12px;
        }

        .section-header.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }

        .section-content {
            flex: 1;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .editor-section.collapsed .section-content,
        .preview-section.collapsed .section-content {
            max-height: 0;
            flex: 0;
        }

        textarea {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #0f0f1a;
            color: #d4d4d4;
            border: none;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: #555;
        }

        .preview-section {
            background: white;
        }

        .preview-section .section-header {
            background: #16213e;
            color: #888;
        }

        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* 移动端：上下布局 + 可收起 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: calc(100vh - 56px);
            }

            .editor-section, .preview-section {
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }

            .editor-section {
                border-right: none;
                border-bottom: 1px solid #0f3460;
            }

            header {
                padding: 12px 16px;
                flex-shrink: 0;
            }

            header h1 {
                font-size: 16px;
            }

            .controls {
                gap: 8px;
            }

            button {
                padding: 10px 14px;
                font-size: 13px;
            }

            textarea {
                font-size: 13px;
            }

            .section-header {
                padding: 10px 16px;
            }

            .editor-section.collapsed,
            .preview-section.collapsed {
                flex: 0;
                min-height: 44px;
            }
        }

        /* 平板横屏微调 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .editor-section, .preview-section {
                flex: 1;
            }
        }

        .empty-hint {
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚡ 网页代码预览器</h1>
        <div class="controls">
            <button class="btn-paste" onclick="pasteCode()">📋 粘贴</button>
            <button class="btn-clear" onclick="clearCode()">清空</button>
            <button class="btn-run" onclick="runCode()">运行代码</button>
        </div>
    </header>

    <div class="container">
        <div class="editor-section" id="editorSection">
            <div class="section-header" onclick="toggleSection('editorSection')">
                <span>📝 代码编辑</span>
                <span class="collapse-icon">▼</span>
            </div>
            <div class="section-content">
                <textarea id="codeInput" placeholder="<!DOCTYPE html>
<html>
<head>
    <style>
        /* 在这里写 CSS */
    </style>
</head>
<body>
    <!-- 在这里写 HTML -->
    <script>
        // 在这里写 JavaScript
    </script>
</body>
</html>"></textarea>
            </div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="section-header" onclick="toggleSection('previewSection')">
                <span>📺 预览效果 <span style="color:#e94560">(实时)</span></span>
                <span class="collapse-icon">▼</span>
            </div>
            <div class="section-content">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('codeInput');
        const previewFrame = document.getElementById('previewFrame');
        let debounceTimer;

        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                section.classList.toggle('collapsed');
            }
        }

        function runCode() {
            const code = codeInput.value;
            if (!code.trim()) {
                previewFrame.srcdoc = '<html><body style="display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f5f5f5;color:#999;font-family:sans-serif;"><div>👈 请在左侧粘贴代码</div></body></html>';
                return;
            }
            previewFrame.srcdoc = code;
        }

        function clearCode() {
            codeInput.value = '';
            runCode();
            codeInput.focus();
        }

        async function pasteCode() {
            try {
                const text = await navigator.clipboard.readText();
                codeInput.value = text;
                runCode();
            } catch (err) {
                alert('粘贴失败，请手动粘贴');
            }
        }

        // 实时预览（防抖）
        codeInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(runCode, 300);
        });

        // 初始化
        runCode();
    </script>
</body>
</html>
